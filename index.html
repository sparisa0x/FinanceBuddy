<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Finance Buddy</title>
    <!-- Keeping Tailwind CDN for simplicity as requested, though moving to PostCSS in package.json is better for prod -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Apply saved theme or default to dark
      (function() {
        var theme = localStorage.getItem('finance_theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        }
        // else keep dark class from HTML
      })();

      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                500: '#0ea5e9',
                600: '#0284c7',
                900: '#0c4a6e',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; }
      html { scroll-behavior: smooth; }
      /* Custom Scrollbar for sleek look */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
      .dark ::-webkit-scrollbar-thumb { background: #475569; }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes riseUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      .animate-fade-in {
        animation: fadeIn 0.35s ease-out;
      }

      .rise-up {
        animation: riseUp 0.7s ease-out both;
      }

      .shimmer {
        background: linear-gradient(110deg, rgba(51,65,85,0.65) 8%, rgba(99,102,241,0.35) 18%, rgba(51,65,85,0.65) 33%);
        background-size: 200% 100%;
        animation: shimmer 1.4s linear infinite;
      }
    </style>
</head>
  <body class="bg-gray-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 transition-colors duration-200">
    <div id="root"></div>
    <!-- This script tag is CRITICAL for Vite to load your App -->
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
